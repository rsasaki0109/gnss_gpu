name: Feature request
description: Suggest a new capability, experiment, dataset, or improvement.
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The motivation or use case. What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: What would you like to see? A method, dataset, API, or experiment idea.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or prior art / references.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I'm interested in implementing this myself
