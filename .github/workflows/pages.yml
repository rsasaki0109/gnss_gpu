name: Pages

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pages.yml"
      - "docs/**"
      - "tests/site/**"
      - "package.json"
      - "package-lock.json"
      - "experiments/build_paper_assets.py"
      - "experiments/build_site_media.py"
      - "experiments/build_githubio_summary.py"
      - "experiments/results/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install numpy matplotlib pillow
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: bash scripts/ci/run_site_smoke.sh
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pages-playwright-artifacts
          path: |
            test-results/
            playwright-report/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
