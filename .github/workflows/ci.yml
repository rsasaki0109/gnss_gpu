name: CI
on: [push, pull_request]
jobs:
  # Job 1: Python-only tests (no GPU required)
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install numpy pytest matplotlib
      - run: PYTHONPATH=python pytest tests/ -v -k "not gpu and not cuda" --ignore=tests/test_positioning.py --ignore=tests/test_raytrace.py --ignore=tests/test_multipath.py --ignore=tests/test_acquisition.py --ignore=tests/test_interference.py --ignore=tests/test_tracking.py --ignore=tests/test_skyplot.py --ignore=tests/test_particle_filter.py --ignore=tests/test_svgd.py --ignore=tests/test_pf3d.py --ignore=tests/test_rtk.py --ignore=tests/test_pf_device.py --ignore=tests/test_ekf.py --ignore=tests/test_multi_gnss.py --ignore=tests/test_atmosphere.py --ignore=tests/test_exp_pf_smoother_eval.py --ignore=tests/test_dd_pseudorange.py --ignore=tests/test_dd_carrier.py --ignore=tests/test_dd_quality.py --ignore=tests/test_fetch_plateau_subset.py --ignore=tests/test_fetch_urbannav_subset.py --ignore=tests/test_cuda_streams.py --ignore=tests/test_tdcp_velocity.py --ignore=tests/test_urbannav_multignss_stabilization.py

  # Job 2: CUDA build check
  build-cuda:
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.4.0-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y cmake python3-dev python3-pip pybind11-dev
      - run: mkdir build && cd build && cmake .. -DCMAKE_CUDA_ARCHITECTURES=80 && make -j$(nproc)

  # Job 3: Lint
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check python/ --ignore=E501,F401
